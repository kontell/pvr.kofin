name: Build
on:
  push:
    branches: ['**']
  pull_request:
env:
  app_id: pvr.kofin

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "GCC / Omega (Kodi 21)"
            cc: gcc
            cxx: g++
            kodi_branch: Omega
            runner: ubuntu-latest
            os: linux
          - name: "Clang / Omega (Kodi 21)"
            cc: clang
            cxx: clang++
            kodi_branch: Omega
            runner: ubuntu-latest
            os: linux
          - name: "GCC / Piers (Kodi 22)"
            cc: gcc
            cxx: g++
            kodi_branch: master
            runner: ubuntu-latest
            os: linux
          - name: "Clang / Piers (Kodi 22)"
            cc: clang
            cxx: clang++
            kodi_branch: master
            runner: ubuntu-latest
            os: linux
          - name: "MSVC / Omega (Kodi 21) Windows x64"
            kodi_branch: Omega
            runner: windows-2022
            os: windows
          - name: "MSVC / Piers (Kodi 22) Windows x64"
            kodi_branch: master
            runner: windows-2022
            os: windows
    name: ${{ matrix.name }}
    steps:
    - name: Checkout addon
      uses: actions/checkout@v5
      with:
        path: ${{ env.app_id }}

    - name: Checkout Kodi
      uses: actions/checkout@v5
      with:
        repository: xbmc/xbmc
        ref: ${{ matrix.kodi_branch }}
        path: xbmc
        sparse-checkout: |
          version.txt
          xbmc/interfaces/json-rpc/schema/version.txt
          cmake/
          xbmc/addons/AddonBindings.cmake
          xbmc/addons/kodi-dev-kit/include/kodi/
        sparse-checkout-cone-mode: false
        fetch-depth: 1

    - name: Install dependencies (Linux)
      if: matrix.os == 'linux'
      run: sudo apt-get update -qq && sudo apt-get install -y autopoint

    - name: Register addon
      shell: bash
      run: |
        mkdir -p xbmc/cmake/addons/addons/${app_id}
        # On Windows runners use pwd -W so the addon definition file contains
        # forward-slash paths that CMake parses identically to Linux.
        if [ "${RUNNER_OS}" = "Windows" ]; then
          WS="$(pwd -W)"
        else
          WS="${{ github.workspace }}"
        fi
        echo "${app_id} ${WS}/${app_id}" > xbmc/cmake/addons/addons/${app_id}/${app_id}.txt

    - name: Configure (Linux)
      if: matrix.os == 'linux'
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: |
        cmake \
          -B ${app_id}/build \
          -DADDONS_TO_BUILD=${app_id} \
          -DADDON_SRC_PREFIX=${{ github.workspace }} \
          -DADDONS_DEFINITION_DIR=${{ github.workspace }}/xbmc/cmake/addons/addons \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/output \
          -DPACKAGE_ZIP=1 \
          ${{ github.workspace }}/xbmc/cmake/addons

    - name: Build (Linux)
      if: matrix.os == 'linux'
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: make -C ${app_id}/build -j$(getconf _NPROCESSORS_ONLN)

    - name: Configure (Windows)
      if: matrix.os == 'windows'
      shell: bash
      run: |
        # pwd -W returns a forward-slash Windows path (e.g. D:/a/pvr.kofin/pvr.kofin)
        # so CMake args are not mangled by bash backslash-escape processing.
        WS="$(pwd -W)"
        cmake \
          -B "${app_id}/build" \
          -G "Visual Studio 17 2022" -A x64 -T host=x64 \
          -DADDONS_TO_BUILD="${app_id}" \
          -DADDON_SRC_PREFIX="${WS}" \
          -DADDONS_DEFINITION_DIR="${WS}/xbmc/cmake/addons/addons" \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX="${WS}/output" \
          -DPACKAGE_ZIP=1 \
          "${WS}/xbmc/cmake/addons"

    - name: Build (Windows)
      if: matrix.os == 'windows'
      shell: bash
      run: cmake --build "${app_id}/build" --config Release --target "${app_id}"
