name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  app_id: pvr.kofin

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - { name: "Linux x86_64 / Kodi 21", os: linux, arch: x86_64, kodi: 21, kodi_branch: Omega }
          - { name: "Linux x86_64 / Kodi 22", os: linux, arch: x86_64, kodi: 22, kodi_branch: master }
          # Linux armv7
          - { name: "Linux armv7 / Kodi 21", os: linux, arch: armv7, kodi: 21, kodi_branch: Omega, cross_pkgs: "gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf" }
          - { name: "Linux armv7 / Kodi 22", os: linux, arch: armv7, kodi: 22, kodi_branch: master, cross_pkgs: "gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf" }
          # Linux aarch64
          - { name: "Linux aarch64 / Kodi 21", os: linux, arch: aarch64, kodi: 21, kodi_branch: Omega, cross_pkgs: "gcc-aarch64-linux-gnu g++-aarch64-linux-gnu" }
          - { name: "Linux aarch64 / Kodi 22", os: linux, arch: aarch64, kodi: 22, kodi_branch: master, cross_pkgs: "gcc-aarch64-linux-gnu g++-aarch64-linux-gnu" }
          # Android armv7
          - { name: "Android armv7 / Kodi 21", os: android, arch: armv7, kodi: 21, kodi_branch: Omega }
          - { name: "Android armv7 / Kodi 22", os: android, arch: armv7, kodi: 22, kodi_branch: master }
          # Android aarch64
          - { name: "Android aarch64 / Kodi 21", os: android, arch: aarch64, kodi: 21, kodi_branch: Omega }
          - { name: "Android aarch64 / Kodi 22", os: android, arch: aarch64, kodi: 22, kodi_branch: master }
    name: ${{ matrix.name }}
    steps:
    - name: Checkout addon
      uses: actions/checkout@v5
      with:
        path: ${{ env.app_id }}

    - name: Checkout Kodi
      uses: actions/checkout@v5
      with:
        repository: xbmc/xbmc
        ref: ${{ matrix.kodi_branch }}
        path: xbmc
        sparse-checkout: |
          version.txt
          xbmc/interfaces/json-rpc/schema/version.txt
          cmake/
          xbmc/addons/AddonBindings.cmake
          xbmc/addons/kodi-dev-kit/include/kodi/
        sparse-checkout-cone-mode: false
        fetch-depth: 1

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y autopoint ${{ matrix.cross_pkgs }}

    - name: Setup Android NDK
      if: matrix.os == 'android'
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27c
        local-cache: true

    - name: Build
      run: |
        ${{ github.workspace }}/${app_id}/scripts/build.sh \
          --os ${{ matrix.os }} \
          --arch ${{ matrix.arch }} \
          --kodi ${{ matrix.kodi }} \
          --kodi-src ${{ github.workspace }}/xbmc \
          ${{ matrix.os == 'android' && format('--ndk {0}', steps.setup-ndk.outputs.ndk-path) || '' }} \
          --output ${{ github.workspace }}/artifacts \
          --jobs $(getconf _NPROCESSORS_ONLN)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.app_id }}-${{ matrix.os }}-${{ matrix.arch }}-kodi${{ matrix.kodi }}
        path: ${{ github.workspace }}/artifacts/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
    - name: Checkout addon (for version)
      uses: actions/checkout@v5

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Flatten artifacts
      run: |
        find artifacts -mindepth 2 -name '*.zip' -exec mv {} artifacts/ \;
        find artifacts -mindepth 1 -type d -empty -delete
        ls -la artifacts/

    - name: Get version
      id: version
      run: |
        version=$(grep '^ *version=' pvr.kofin/addon.xml.in | head -1 | sed 's/.*version="\([^"]*\)".*/\1/')
        echo "version=$version" >> $GITHUB_OUTPUT
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
        else
          echo "tag=v$version" >> $GITHUB_OUTPUT
        fi

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ${{ env.app_id }} ${{ steps.version.outputs.version }}
        draft: true
        files: artifacts/*.zip
